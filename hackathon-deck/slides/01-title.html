<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>01 · Title</title>
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  .frame { position: absolute; inset: 120px; display: flex; flex-direction: column; justify-content: space-between; }
  .top-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .eyebrow-stack { display: flex; flex-direction: column; gap: 14px; }
  .logomark {
    width: 72px; height: 72px;
    border: 2px solid var(--teal);
    position: relative;
  }
  .logomark::before, .logomark::after {
    content: ""; position: absolute; background: var(--teal);
  }
  .logomark::before { left: 14px; top: 14px; width: 28px; height: 2px; }
  .logomark::after  { left: 14px; top: 22px; width: 44px; height: 2px; box-shadow: 0 8px 0 var(--terracotta); }
  .headline { max-width: 1400px; margin-top: 140px; }
  .headline .script { font-style: italic; font-variation-settings: "opsz" 144, "SOFT" 100; color: var(--terracotta-dk); }
  .tagline {
    margin-top: 40px; font-size: 32px; color: var(--ink-muted);
    max-width: 900px; line-height: 1.35;
  }
  .meta-row {
    display: flex; gap: 80px; align-items: center;
    padding-top: 36px; border-top: 1px solid var(--rule);
  }
  .meta-item .label { display: block; font-size: 13px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--ink-muted); margin-bottom: 8px; }
  .meta-item .value { font-family: var(--font-display); font-size: 28px; color: var(--teal); font-weight: 500; }
</style>
</head>
<body class="slide">

<div class="frame">

  <div class="top-row">
    <div class="eyebrow-stack">
      <span class="eyebrow">Hack-O-Relay 5.0 · Supply Chain Track</span>
      <span class="body-s" style="letter-spacing: 0.08em;">Pitch deck · 2026</span>
    </div>
    <div class="logomark" aria-hidden="true"></div>
  </div>

  <div class="headline">
    <div class="display-xl">Order Intake</div>
    <div class="display-xl script">Agent.</div>
    <div class="tagline">The B2B inbox, read and understood &mdash; so nobody has to re-type another PDF into an ERP.</div>
  </div>

  <div class="meta-row">
    <div class="meta-item"><span class="label">Team</span><span class="value">Gabru</span></div>
    <div class="meta-item"><span class="label">Track</span><span class="value">AI &middot; Supply Chain</span></div>
    <div class="meta-item"><span class="label">Built on</span><span class="value">Google ADK &middot; Gemini &middot; Firestore</span></div>
  </div>

</div>

<div class="slide-chrome"><span class="rule"></span><span>01 / 10</span></div>

</body>
</html>
